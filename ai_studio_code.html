<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMEN PRO v3.1</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Inter:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

    <header id="main-header">
        <div class="logo">LUMEN <span>v3.1</span></div>
        <div class="transport">
            <button id="play-btn">PLAY</button>
            <button id="stop-btn">STOP</button>
            <div id="clock">00:00.00</div>
        </div>
        <div class="actions">
            <button class="btn-main" id="patch-toggle">+ PATCH FIXTURE</button>
        </div>
    </header>

    <main id="editor">
        <aside id="inspector">
            <div class="panel-label">PROPRIÉTÉS</div>
            <div id="inspector-ui" style="display:none;">
                <h2 id="ins-name">NOM</h2>
                <div class="fader"><label>DIMMER</label><input type="range" id="f-dim" min="0" max="100"></div>
                <div class="fader"><label>PAN</label><input type="range" id="f-pan" min="0" max="100"></div>
                <div class="fader"><label>TILT</label><input type="range" id="f-tilt" min="0" max="100"></div>
                <div class="fader"><label>COULEUR</label><input type="color" id="f-color"></div>
                <button id="fx-sine-btn" class="fx-btn">SINE WAVE FX</button>
            </div>
            <p id="ins-msg">Sélectionnez une fixture</p>
        </aside>

        <section id="viewport">
            <div id="three-canvas"></div>
        </section>
    </main>

    <footer id="timeline">
        <div class="tl-sidebar">PISTES</div>
        <div id="tl-grid">
            <div id="playhead"></div>
            <div id="tracks-list"></div>
        </div>
    </footer>

    <div id="patch-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>PATCHER UNE FIXTURE</h3><button id="close-modal">✕</button></div>
            <div class="lib-grid">
                <div class="lib-item" onclick="addFixture('beam')">BEAM</div>
                <div class="lib-item" onclick="addFixture('wash')">WASH</div>
                <div class="lib-item" onclick="addFixture('spot')">SPOT</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="app.js"></script>
</body>
</html>

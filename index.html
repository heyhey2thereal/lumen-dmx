<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMEN — Console DMX</title>
<style>
:root{
  --bg:#0a0c0f;
  --panel:#14171c;
  --panel-2:#191d23;
  --panel-3:#1e2229;
  --line:#252a31;
  --text:#e8e6e1;
  --muted:#7a828c;
  --muted-2:#4d545c;
  --amber:#f5a623;
  --amber-dim:#7a5417;
  --cyan:#3ed6c4;
  --cyan-dim:#1d6a61;
  --red:#e5484d;
  --violet:#a78bfa;
  --font-ui:'Space Grotesk',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,'SF Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);overflow:hidden;font-size:13px;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
button{font-family:var(--font-ui);cursor:pointer;border:none;background:none;color:var(--text);}
input,select{font-family:var(--font-mono);background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:4px;padding:4px 6px;font-size:12px;}
input:focus,select:focus{outline:1px solid var(--amber);}
input[type=range]{padding:0;}
input[type=color]{padding:1px;height:26px;}

.app{
  display:grid;
  grid-template-rows:52px 1fr auto;
  height:100vh;width:100vw;
}

/* ===== TOP BAR ===== */
#topbar{
  background:var(--panel);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;
  padding:0 12px;gap:14px;
}
.brand{display:flex;align-items:center;gap:6px;min-width:90px;}
.brand .mark{width:8px;height:8px;border-radius:2px;background:var(--amber);box-shadow:0 0 8px var(--amber);}
.brand b{font-size:14px;letter-spacing:2px;}
.transport{display:flex;align-items:center;gap:4px;}
.transport button{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:var(--panel-2);border:1px solid var(--line);}
.transport button.play{background:var(--amber);color:#1a1200;border-color:var(--amber);}
.transport button svg{width:13px;height:13px;fill:currentColor;}
.timecode{font-family:var(--font-mono);font-size:15px;color:var(--amber);min-width:76px;text-align:center;font-variant-numeric:tabular-nums;}
.bpm-mini{font-family:var(--font-mono);font-size:12px;color:var(--cyan);background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:5px 9px;display:flex;align-items:center;gap:6px;}
.bpm-mini button{font-size:9px;color:var(--muted);border:1px solid var(--line);border-radius:4px;padding:2px 6px;}
.spacer{flex:1;}
.track-name-mini{font-size:10.5px;color:var(--muted);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.export-menu{position:relative;}
.export-btn{background:var(--amber);color:#1a1200;border-radius:7px;padding:8px 14px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;}
.export-btn:hover{filter:brightness(1.08);}
.export-dropdown{
  position:absolute;top:calc(100% + 6px);right:0;
  background:var(--panel-3);border:1px solid var(--line);border-radius:8px;
  min-width:230px;box-shadow:0 8px 30px rgba(0,0,0,.5);
  display:none;flex-direction:column;padding:6px;z-index:50;
}
.export-dropdown.open{display:flex;}
.export-dropdown .item{
  display:flex;flex-direction:column;gap:1px;
  padding:8px 10px;border-radius:6px;text-align:left;
}
.export-dropdown .item:hover{background:var(--panel-2);}
.export-dropdown .item .t{font-size:12px;font-weight:600;}
.export-dropdown .item .d{font-size:10px;color:var(--muted);}
.export-dropdown .item .badge{
  font-size:8.5px;letter-spacing:.5px;color:var(--amber);
  border:1px solid var(--amber-dim);border-radius:3px;padding:1px 5px;
  display:inline-block;margin-top:3px;width:fit-content;
}
.export-dropdown hr{border:none;border-top:1px solid var(--line);margin:5px 2px;}
.import-btn{background:var(--panel-2);border:1px solid var(--line);border-radius:7px;padding:8px 12px;font-size:12px;display:flex;align-items:center;gap:6px;}
.import-btn svg{width:12px;height:12px;fill:var(--amber);}

/* ===== CENTER : preview + timeline ===== */
#center{
  display:grid;
  grid-template-columns:300px 1fr;
  min-height:0;
}
#sidebar{order:-1;}
#stage-col{display:flex;flex-direction:column;min-height:0;min-width:0;}

#preview-row{
  display:flex;justify-content:center;align-items:center;
  padding:14px;background:var(--bg);border-bottom:1px solid var(--line);
  flex-shrink:0;
}
#preview-square{
  width:min(100%, 780px);
  aspect-ratio:16/9;
  background:#05070a;
  border:1px solid var(--line);
  border-radius:10px;
  position:relative;
  overflow:hidden;
  box-shadow:0 0 0 1px rgba(245,166,35,0.08), inset 0 0 40px rgba(0,0,0,.6);
}
#preview-square canvas{display:block;width:100%;height:100%;cursor:grab;}
#preview-square canvas:active{cursor:grabbing;}
.preview-label{
  position:absolute;top:8px;left:10px;
  font-size:9px;letter-spacing:2px;color:var(--muted);
  display:flex;align-items:center;gap:5px;
}
.preview-label .dot{width:5px;height:5px;border-radius:50%;background:var(--amber);animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.preview-time{
  position:absolute;bottom:8px;right:10px;
  font-family:var(--font-mono);font-size:10px;color:var(--muted);
}

#timeline-area{flex:1;min-height:0;display:flex;flex-direction:column;background:var(--panel);}
.tl-toolbar{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid var(--line);flex-shrink:0;}
.tl-toolbar .grp{display:flex;align-items:center;gap:3px;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:2px;}
.tl-toolbar .grp button{font-size:11px;padding:3px 7px;border-radius:4px;color:var(--muted);}
.tl-toolbar .grp button.active{background:var(--line);color:var(--text);}
.tl-toolbar label{font-size:9.5px;color:var(--muted);letter-spacing:1px;}
.zoom-range{width:80px;}
#tl-duration{margin-left:auto;color:var(--muted);font-family:var(--font-mono);font-size:11px;}

#tracks-scroll{flex:1;overflow:auto;position:relative;min-height:0;}
#tracks-inner{position:relative;}
#ruler-canvas{position:sticky;top:0;z-index:5;display:block;background:#0e1116;border-bottom:1px solid var(--line);}
.track-row{display:flex;border-bottom:1px solid var(--line);height:46px;}
.track-head{
  position:sticky;left:0;z-index:4;
  width:140px;flex-shrink:0;
  background:var(--panel-3);border-right:1px solid var(--line);
  display:flex;align-items:center;gap:7px;padding:0 9px;
}
.track-head .color-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.track-head .tname{font-size:10.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.track-lane{position:relative;flex:1;background:repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,0.02) 60px);}
.track-lane.master{background:#0e1116;}
.clip{
  position:absolute;top:5px;bottom:5px;
  border-radius:5px;
  cursor:pointer;
  border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;padding:0 6px;
  font-size:10px;color:#0a0c0f;font-weight:600;
  overflow:hidden;white-space:nowrap;
  box-shadow:0 1px 4px rgba(0,0,0,.4);
}
.clip.selected{outline:2px solid #fff;outline-offset:1px;}
.clip .handle{position:absolute;top:0;bottom:0;width:6px;cursor:ew-resize;}
.clip .handle.l{left:0;}
.clip .handle.r{right:0;}
.playhead-line{position:absolute;top:0;bottom:0;width:2px;background:var(--amber);z-index:6;pointer-events:none;}
.beat-tick{position:absolute;top:0;bottom:0;width:1px;pointer-events:none;}
.empty-tracks{padding:40px;text-align:center;color:var(--muted-2);font-size:11.5px;}

/* ===== RIGHT SIDEBAR (contextuel) ===== */
#sidebar{
  border-right:1px solid var(--line);background:var(--panel);
  display:flex;flex-direction:column;min-height:0;overflow-y:auto;
}

/* ===== BOTTOM TOOLBAR + PANEL COULISSANT ===== */
#bottom-zone{position:relative;flex-shrink:0;}
#sliding-panel{
  position:absolute;left:0;right:0;bottom:56px;
  height:0; overflow:hidden;
  background:var(--panel-3);border-top:1px solid var(--line);
  transition:height .22s ease;
  display:flex;flex-direction:column;
}
#sliding-panel.open{height:280px;}
.panel-inner{flex:1;overflow-y:auto;padding:12px 16px;}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--line);}
.panel-header h3{font-size:11px;letter-spacing:1.5px;color:var(--muted);}
.panel-header button{font-size:16px;color:var(--muted);}

#toolbar{
  height:56px;background:var(--panel);border-top:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.tool-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 16px;border-radius:8px;color:var(--muted);
}
.tool-btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.6;}
.tool-btn span{font-size:9px;letter-spacing:.5px;}
.tool-btn.active{color:var(--amber);background:var(--panel-2);}
.tool-btn.active svg{fill:var(--amber);stroke:var(--amber);}

/* ===== bibliothèque (dans panneau Lumières) ===== */
.lib-layout{display:grid;grid-template-columns:1fr 1fr;gap:14px;height:100%;}
.search-box input{width:100%;padding:6px 9px;font-size:12px;margin-bottom:8px;}
.cat-tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.cat-tabs button{font-size:9.5px;padding:3px 7px;border-radius:10px;border:1px solid var(--line);color:var(--muted);}
.cat-tabs button.active{background:var(--amber-dim);border-color:var(--amber);color:var(--amber);}
#fixture-list{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;align-content:start;overflow-y:auto;max-height:190px;}
.fixture-card{background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:7px 8px;cursor:pointer;position:relative;transition:border-color .12s;}
.fixture-card:hover{border-color:var(--amber-dim);}
.add-fixture-btn{
  position:absolute;top:5px;right:5px;
  width:18px;height:18px;border-radius:5px;
  background:var(--amber);color:#1a1200;
  font-size:13px;font-weight:700;line-height:1;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .12s;
}
.fixture-card:hover .add-fixture-btn{opacity:1;}
.fixture-card .name{font-size:10.5px;font-weight:600;line-height:1.25;}
.fixture-card .meta{font-size:9px;color:var(--muted);margin-top:3px;display:flex;justify-content:space-between;}
.fixture-card .brand-tag{font-size:8px;color:var(--cyan);letter-spacing:.5px;}

.patch-panel{display:flex;flex-direction:column;min-height:0;}
.patch-panel .count{font-size:10.5px;color:var(--muted);margin-bottom:6px;}
.patch-panel .count b{color:var(--amber);font-family:var(--font-mono);}
table.patch-table{width:100%;border-collapse:collapse;font-size:10.5px;}
.patch-table thead th{text-align:left;font-size:8.5px;letter-spacing:1px;color:var(--muted);padding:5px 6px;border-bottom:1px solid var(--line);}
.patch-table tbody tr{border-bottom:1px solid var(--line);}
.patch-table tbody tr.conflict td{color:var(--red);}
.patch-table td{padding:4px 6px;}
.patch-table input,.patch-table select{width:50px;padding:2px 4px;font-size:10px;}
.patch-table select.mode-select{width:110px;}
.chan-range{font-family:var(--font-mono);color:var(--cyan);}
.del-btn{color:var(--muted);font-size:12px;padding:1px 5px;border-radius:3px;}
.del-btn:hover{color:var(--red);}

/* ===== panneau Musique ===== */
.music-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.music-card{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:12px;}
.music-card h4{font-size:9.5px;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;}
.big-bpm{font-family:var(--font-mono);font-size:30px;color:var(--cyan);}
.sync-btn{margin-top:10px;background:var(--cyan);color:#04201c;font-weight:700;border-radius:7px;padding:9px 14px;font-size:12px;width:100%;}
.sync-btn:hover{filter:brightness(1.08);}
.sync-opts{display:flex;flex-direction:column;gap:6px;margin-top:8px;font-size:11px;color:var(--muted);}
.sync-opts label{display:flex;align-items:center;gap:6px;}

/* ===== panneau Animation (keyframes) ===== */
.anim-empty{padding:30px;text-align:center;color:var(--muted-2);font-size:11.5px;}
.anim-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:16px;height:100%;}
.anim-controls{display:flex;flex-direction:column;gap:10px;}
.field-row{display:flex;align-items:center;gap:10px;}
.field-row label{width:70px;font-size:10.5px;color:var(--muted);flex-shrink:0;}
.field-row input[type=range]{flex:1;}
.field-row .val{width:42px;text-align:right;font-family:var(--font-mono);font-size:11px;color:var(--amber);}
.effect-select{width:100%;}
.kf-list{display:flex;flex-direction:column;gap:5px;overflow-y:auto;max-height:210px;}
.kf-row{display:flex;align-items:center;gap:8px;background:var(--panel-2);border:1px solid var(--line);border-radius:5px;padding:5px 8px;font-size:10.5px;}
.kf-row .t{font-family:var(--font-mono);color:var(--cyan);width:52px;}
.kf-row .desc{flex:1;color:var(--muted);}
.add-kf-btn{background:var(--amber-dim);color:var(--amber);border-radius:6px;padding:7px;font-size:11px;font-weight:600;}
</style>
</head>
<body>
<div class="app">
  <div id="topbar"></div>
  <div id="center">
    <div id="stage-col">
      <div id="preview-row">
        <div id="preview-square">
          <div class="preview-label"><span class="dot"></span>APERÇU 3D</div>
          <div class="preview-time" id="preview-time">00:00.00</div>
          <div style="position:absolute;bottom:8px;left:10px;font-size:8.5px;color:var(--muted-2);letter-spacing:.5px;">CLIC = sélectionner · GLISSER une fixture = déplacer · GLISSER le fond = orbiter</div>
        </div>
      </div>
      <div id="timeline-area"></div>
    </div>
    <div id="sidebar"></div>
  </div>
  <div id="bottom-zone">
    <div id="sliding-panel"></div>
    <div id="toolbar"></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="app.js"></script>
</body>
</html>

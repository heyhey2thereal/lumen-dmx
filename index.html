<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMEN — Console DMX</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div id="topbar"></div>
        <div id="center">
            <div id="sidebar"></div>
            <div id="stage-col">
                <div id="preview-row">
                    <div id="preview-square">
                        <div class="preview-label"><span class="dot"></span>APERÇU 3D</div>
                        <div class="preview-time" id="preview-time">00:00.00</div>
                        <div style="position:absolute;bottom:8px;left:10px;font-size:8.5px;color:var(--muted-2);letter-spacing:.5px;">CLIC = sélectionner · GLISSER une fixture = déplacer · GLISSER le fond = orbiter</div>
                    </div>
                </div>
                <div id="timeline-area"></div>
            </div>
        </div>
        <div id="bottom-zone">
            <div id="sliding-panel"></div>
            <div id="toolbar"></div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="app.js"></script>
</body>
</html>

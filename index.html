<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMEN PRO — Visualiseur & Console</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app-wrapper">
    <header id="topbar">
        <div class="logo">LUMEN <span>ENGINE</span></div>
        <div class="transport">
            <button id="btn-stop">STOP</button>
            <button id="btn-play" class="active">PLAY</button>
            <div id="timecode">00:00:00</div>
        </div>
        <div class="spacer"></div>
        <div class="file-ops">
            <label for="audio-upload" class="btn-subtle">AUDIO</label>
            <input type="file" id="audio-upload" hidden>
            <button class="btn-primary" onclick="togglePanel('lib')">PATCH</button>
        </div>
    </header>

    <main id="main-content">
        <aside id="inspector">
            <div class="section-title">FIXTURE PROPERTIES</div>
            <div id="ins-none" class="empty-msg">Aucune sélection</div>
            <div id="ins-controls" style="display:none;">
                <div class="fix-info">
                    <strong id="ins-name">-</strong>
                    <span id="ins-type">-</span>
                </div>
                
                <div class="control-grid">
                    <div class="fader-item">
                        <label>DIM</label>
                        <input type="range" id="f-dim" min="0" max="100">
                    </div>
                    <div class="fader-item">
                        <label>PAN</label>
                        <input type="range" id="f-pan" min="0" max="100">
                    </div>
                    <div class="fader-item">
                        <label>TILT</label>
                        <input type="range" id="f-tilt" min="0" max="100">
                    </div>
                </div>

                <div class="color-section">
                    <label>COLOR</label>
                    <input type="color" id="f-color">
                </div>

                <div class="fx-section">
                    <button id="btn-fx-sine" class="btn-fx">AUTO-SINE FX</button>
                </div>
            </div>
        </aside>

        <section id="viewport-container">
            <div id="render-canvas"></div>
            <div class="viewport-ui">
                <div class="badge">3D LIVE VIEW</div>
                <div class="hint">ALT + DRAG : Rotation | CLIC : Sélection</div>
            </div>
        </section>
    </main>

    <footer id="timeline">
        <div class="tl-header">
            <div class="tl-track-label">TRACKS</div>
            <div id="tl-ruler"></div>
        </div>
        <div id="tl-body">
            <div id="playhead"></div>
            <div id="tracks-list"></div>
        </div>
    </footer>

    <div id="bottom-overlay">
        <div class="overlay-header">
            <span id="overlay-title">LIBRARY</span>
            <button onclick="togglePanel(null)">CLOSE</button>
        </div>
        <div id="overlay-content"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="app.js"></script>
</body>
</html>

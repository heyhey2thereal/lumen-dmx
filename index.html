<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMEN PRO v3.0</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts pour le look "Console" -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

    <header id="main-header">
        <div class="logo">LUMEN <span>v3.0</span></div>
        
        <div class="transport">
            <button id="play-btn">PLAY</button>
            <button id="stop-btn">STOP</button>
            <div id="clock">00:00.00</div>
        </div>

        <div class="actions">
            <label for="audio-input" class="btn-alt">AUDIO</label>
            <input type="file" id="audio-input" hidden>
            <button class="btn-main" id="patch-toggle">PATCH FIXTURE</button>
        </div>
    </header>

    <main id="editor">
        <!-- Barre Latérale de Contrôle -->
        <aside id="inspector">
            <div class="panel-label">PARAMÈTRES FIXTURE</div>
            <div id="inspector-ui" style="display:none;">
                <h2 id="ins-name">NOM</h2>
                <div class="fader">
                    <label>DIMMER</label>
                    <input type="range" id="f-dim" min="0" max="100" value="100">
                </div>
                <div class="fader">
                    <label>PAN</label>
                    <input type="range" id="f-pan" min="0" max="100" value="50">
                </div>
                <div class="fader">
                    <label>TILT</label>
                    <input type="range" id="f-tilt" min="0" max="100" value="50">
                </div>
                <div class="fader">
                    <label>COULEUR</label>
                    <input type="color" id="f-color" value="#00ffff">
                </div>
                <button id="fx-sine-btn" class="fx-btn">SINE WAVE FX</button>
            </div>
            <p id="ins-msg">Aucune sélection</p>
        </aside>

        <!-- Visualiseur 3D -->
        <section id="viewport">
            <div id="three-canvas"></div>
            <div class="vis-info">APERÇU 3D TEMPS RÉEL</div>
        </section>
    </main>

    <!-- Timeline en bas -->
    <footer id="timeline">
        <div class="tl-sidebar">PISTES</div>
        <div id="tl-grid">
            <div id="playhead"></div>
            <div id="tracks-list"></div>
        </div>
    </footer>

    <!-- Overlay de Bibliothèque -->
    <div id="patch-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>BIBLIOTHÈQUE FIXTURES</h3>
                <button id="close-modal">✕</button>
            </div>
            <div class="lib-grid">
                <div class="lib-item" onclick="addFixture('beam')"><strong>BEAM</strong> 16ch</div>
                <div class="lib-item" onclick="addFixture('wash')"><strong>WASH</strong> 24ch</div>
                <div class="lib-item" onclick="addFixture('spot')"><strong>SPOT</strong> 20ch</div>
            </div>
        </div>
    </div>

    <!-- Librairies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="app.js"></script>
</body>
</html>

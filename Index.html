<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMEN — Console DMX</title>
<style>
:root{
  --bg:#0a0c0f;
  --panel:#14171c;
  --panel-2:#191d23;
  --line:#252a31;
  --text:#e8e6e1;
  --muted:#7a828c;
  --muted-2:#4d545c;
  --amber:#f5a623;
  --amber-dim:#7a5417;
  --cyan:#3ed6c4;
  --cyan-dim:#1d6a61;
  --red:#e5484d;
  --font-ui:'Space Grotesk',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,'SF Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-ui);
  overflow:hidden;
  font-size:14px;
}
@font-face{
  font-family:'Space Grotesk';
  src:local('Space Grotesk');
}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:var(--muted-2);}

button{
  font-family:var(--font-ui);
  cursor:pointer;
  border:none;
  background:none;
  color:var(--text);
}
input,select{
  font-family:var(--font-mono);
  background:var(--panel-2);
  border:1px solid var(--line);
  color:var(--text);
  border-radius:4px;
  padding:4px 6px;
  font-size:12px;
}
input:focus,select:focus{outline:1px solid var(--amber);}

.app{
  display:grid;
  grid-template-rows:56px 1fr;
  grid-template-columns:280px 1fr 300px;
  grid-template-areas:
    "header header header"
    "library main inspector";
  height:100vh;
  width:100vw;
}

/* ===== HEADER ===== */
header{
  grid-area:header;
  background:var(--panel);
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  padding:0 16px;
  gap:24px;
}
.brand{
  display:flex;
  align-items:baseline;
  gap:6px;
  min-width:110px;
}
.brand .mark{
  width:9px;height:9px;border-radius:2px;
  background:var(--amber);
  box-shadow:0 0 8px var(--amber);
  display:inline-block;
  margin-right:2px;
}
.brand b{
  font-size:16px;
  letter-spacing:2px;
  font-weight:700;
}
.brand span{
  font-size:10px;
  color:var(--muted);
  letter-spacing:1px;
}
.transport{
  display:flex;
  align-items:center;
  gap:6px;
}
.transport button{
  width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;
  border-radius:6px;
  background:var(--panel-2);
  border:1px solid var(--line);
  transition:background .12s;
}
.transport button:hover{background:var(--line);}
.transport button.play{
  background:var(--amber);
  color:#1a1200;
  border-color:var(--amber);
}
.transport button.play:hover{filter:brightness(1.1);}
.transport button svg{width:14px;height:14px;fill:currentColor;}

.timecode{
  font-family:var(--font-mono);
  font-size:20px;
  letter-spacing:1px;
  color:var(--amber);
  min-width:110px;
  text-align:center;
  font-variant-numeric:tabular-nums;
}
.timecode .sub{
  display:block;
  font-size:9px;
  color:var(--muted);
  letter-spacing:2px;
  text-align:center;
  font-family:var(--font-ui);
}

.bpm-block{
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--panel-2);
  border:1px solid var(--line);
  border-radius:8px;
  padding:6px 12px;
}
.bpm-value{
  font-family:var(--font-mono);
  font-size:22px;
  color:var(--cyan);
  min-width:64px;
  text-align:center;
}
.bpm-value .lbl{
  display:block;
  font-size:9px;
  color:var(--muted);
  font-family:var(--font-ui);
  letter-spacing:2px;
}
.bpm-actions{display:flex;flex-direction:column;gap:3px;}
.bpm-actions button{
  font-size:10px;
  padding:2px 8px;
  border:1px solid var(--line);
  border-radius:4px;
  color:var(--muted);
  background:var(--panel);
}
.bpm-actions button:hover{color:var(--text);border-color:var(--cyan-dim);}
.bpm-actions button.active{color:var(--bg);background:var(--cyan);border-color:var(--cyan);}

.file-import{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:10px;
}
.import-btn{
  background:var(--panel-2);
  border:1px solid var(--line);
  border-radius:6px;
  padding:8px 14px;
  font-size:12px;
  display:flex;
  align-items:center;
  gap:8px;
  color:var(--text);
}
.import-btn:hover{border-color:var(--amber-dim);}
.import-btn svg{width:13px;height:13px;fill:var(--amber);}
.track-name{
  font-size:11px;
  color:var(--muted);
  max-width:160px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.proj-actions{display:flex;gap:6px;}
.proj-actions button{
  font-size:10px;
  color:var(--muted);
  border:1px solid var(--line);
  border-radius:5px;
  padding:6px 9px;
}
.proj-actions button:hover{color:var(--text);border-color:var(--muted-2);}

/* ===== LIBRARY (LEFT) ===== */
#library{
  grid-area:library;
  background:var(--panel);
  border-right:1px solid var(--line);
  display:flex;
  flex-direction:column;
  min-height:0;
}
.panel-title{
  padding:12px 14px 8px;
  font-size:10px;
  letter-spacing:2px;
  color:var(--muted);
  font-weight:600;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.search-box{
  margin:0 12px 10px;
}
.search-box input{width:100%;padding:7px 10px;font-size:12px;}
.cat-tabs{
  display:flex;
  flex-wrap:wrap;
  gap:4px;
  padding:0 12px 10px;
}
.cat-tabs button{
  font-size:10px;
  padding:4px 8px;
  border-radius:12px;
  border:1px solid var(--line);
  color:var(--muted);
}
.cat-tabs button.active{
  background:var(--amber-dim);
  border-color:var(--amber);
  color:var(--amber);
}
#fixture-list{
  flex:1;
  overflow-y:auto;
  padding:0 10px 10px;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.fixture-card{
  background:var(--panel-2);
  border:1px solid var(--line);
  border-radius:7px;
  padding:9px 10px;
  cursor:grab;
  transition:border-color .12s, transform .08s;
}
.fixture-card:hover{border-color:var(--amber-dim);}
.fixture-card:active{cursor:grabbing;transform:scale(.98);}
.fixture-card .name{font-size:12.5px;font-weight:600;}
.fixture-card .meta{
  font-size:10px;
  color:var(--muted);
  margin-top:3px;
  display:flex;
  justify-content:space-between;
}
.fixture-card .meta b{color:var(--cyan);font-family:var(--font-mono);}
.fixture-card .icon-tag{
  display:inline-block;
  font-size:8.5px;
  letter-spacing:.5px;
  color:var(--muted);
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:3px;
  padding:1px 5px;
  margin-top:5px;
}

/* ===== MAIN (TIMELINE + PATCH) ===== */
#main{
  grid-area:main;
  display:grid;
  grid-template-rows:220px 1fr;
  min-height:0;
  min-width:0;
}
#timeline-wrap{
  border-bottom:1px solid var(--line);
  background:var(--panel);
  display:flex;
  flex-direction:column;
  min-width:0;
}
.tl-toolbar{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 12px;
  border-bottom:1px solid var(--line);
}
.tl-toolbar .grp{
  display:flex;
  align-items:center;
  gap:4px;
  background:var(--panel-2);
  border:1px solid var(--line);
  border-radius:6px;
  padding:3px;
}
.tl-toolbar .grp button{
  font-size:11px;
  padding:4px 8px;
  border-radius:4px;
  color:var(--muted);
}
.tl-toolbar .grp button:hover{color:var(--text);}
.tl-toolbar .grp button.active{background:var(--line);color:var(--text);}
.tl-toolbar label{font-size:10px;color:var(--muted);letter-spacing:1px;}
.zoom-range{width:90px;}
#timeline-canvas-wrap{
  flex:1;
  position:relative;
  overflow-x:auto;
  overflow-y:hidden;
  min-height:0;
}
#timeline-canvas{
  display:block;
  height:100%;
}
.empty-audio{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
  color:var(--muted-2);
  pointer-events:none;
}
.empty-audio svg{width:34px;height:34px;fill:var(--muted-2);}
.empty-audio span{font-size:11px;letter-spacing:1px;}

#patch-wrap{
  min-height:0;
  display:flex;
  flex-direction:column;
  background:var(--bg);
}
.patch-toolbar{
  display:flex;
  align-items:center;
  padding:10px 14px;
  border-bottom:1px solid var(--line);
  gap:10px;
}
.patch-toolbar .count{
  font-size:11px;
  color:var(--muted);
}
.patch-toolbar .count b{color:var(--amber);font-family:var(--font-mono);}
.universe-select{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:6px;
}
.universe-select label{font-size:10px;color:var(--muted);}
#patch-table-wrap{
  flex:1;
  overflow-y:auto;
}
table.patch-table{
  width:100%;
  border-collapse:collapse;
}
.patch-table thead th{
  position:sticky;top:0;
  background:var(--panel);
  text-align:left;
  font-size:9.5px;
  letter-spacing:1.5px;
  color:var(--muted);
  padding:8px 10px;
  border-bottom:1px solid var(--line);
  font-weight:600;
  z-index:1;
}
.patch-table tbody tr{
  border-bottom:1px solid var(--line);
  transition:background .1s;
}
.patch-table tbody tr:hover{background:var(--panel);}
.patch-table tbody tr.selected{background:var(--panel-2);}
.patch-table tbody tr.conflict td{color:var(--red);}
.patch-table td{padding:7px 10px;font-size:12px;vertical-align:middle;}
.patch-table td.name-cell{display:flex;align-items:center;gap:8px;}
.color-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.patch-table input[type=number],.patch-table select{
  width:64px;
  padding:3px 6px;
  font-size:11px;
}
.patch-table select.mode-select{width:150px;}
.chan-range{font-family:var(--font-mono);color:var(--cyan);font-size:11px;}
.del-btn{
  color:var(--muted);
  font-size:14px;
  padding:2px 6px;
  border-radius:4px;
}
.del-btn:hover{color:var(--red);background:var(--panel-2);}
.empty-patch{
  padding:60px 20px;
  text-align:center;
  color:var(--muted-2);
  font-size:12px;
}

/* ===== INSPECTOR (RIGHT) ===== */
#inspector{
  grid-area:inspector;
  background:var(--panel);
  border-left:1px solid var(--line);
  display:flex;
  flex-direction:column;
  min-height:0;
  overflow-y:auto;
}
.insp-empty{
  padding:40px 20px;
  color:var(--muted-2);
  font-size:12px;
  text-align:center;
}
.insp-header{
  padding:14px;
  border-bottom:1px solid var(--line);
}
.insp-header .fname{font-size:14px;font-weight:700;}
.insp-header .ftype{font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:2px;}
.insp-section{padding:14px;border-bottom:1px solid var(--line);}
.insp-section h4{
  font-size:9.5px;
  letter-spacing:1.5px;
  color:var(--muted);
  margin-bottom:10px;
  font-weight:600;
}
.insp-field{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}
.insp-field label{font-size:11px;color:var(--muted);}
.channel-map{display:flex;flex-direction:column;gap:4px;}
.channel-row{
  display:flex;
  align-items:center;
  gap:8px;
  font-family:var(--font-mono);
  font-size:11px;
  padding:4px 6px;
  border-radius:4px;
  background:var(--panel-2);
}
.channel-row .ch-num{
  color:var(--amber);
  width:26px;
  flex-shrink:0;
}
.channel-row .ch-name{color:var(--text);flex:1;}
.channel-row .ch-val{
  color:var(--muted);
  width:32px;
  text-align:right;
}
</style>
</head>
<body>
<div class="app">
  <header id="header"></header>
  <div id="library"></div>
  <div id="main">
    <div id="timeline-wrap"></div>
    <div id="patch-wrap"></div>
  </div>
  <div id="inspector"></div>
</div>
<script src="app.js"></script>
</body>
</html>
